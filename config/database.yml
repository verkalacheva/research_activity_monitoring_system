default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV.fetch("DATABASE_URL") { "postgresql://postgres:password@db:5432/postgres" } %>

development:
  <<: *default

test:
  <<: *default
  database: postgres_test

production:
  <<: *default

