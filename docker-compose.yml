services:
  db:
    image: postgres:14
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: password

  web:
    build: .
    command: bash -c "bundle check || bundle install && rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/research_activity_monitoring_system_development
      ANALYTICS_SERVICE_HOST: analytics:50051
      INTEGRATION_SERVICE_HOST: integration:50052
    depends_on:
      - db
      - analytics
      - integration

  analytics:
    build:
      context: ./analytics_service
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/research_activity_monitoring_system_development?sslmode=disable
      PORT: 50051
    depends_on:
      - db

  integration:
    build:
      context: ./integration_service
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/research_activity_monitoring_system_development?sslmode=disable
      PORT: 50052
    ports:
      - "50052:50052"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      target: build-env
    command: >
      bash -c "flutter pub get &&
               flutter create . --platforms web &&
               nodemon --watch lib --ext dart --exec 'flutter run -d web-server --web-port 80 --web-hostname 0.0.0.0'"
    volumes:
      - ./frontend:/app
    ports:
      - "8080:80"
    stdin_open: true
    tty: true
    depends_on:
      - web

volumes:
  bundle_data:

