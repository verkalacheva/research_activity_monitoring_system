services:
  db:
    image: postgres:14
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: research_activity_monitoring_system_production
    ports:
      - "${DOCKER_PUBLISH_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PUBLISH_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  analytics:
    build:
      context: ./analytics_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/research_activity_monitoring_system_production?sslmode=disable
      PORT: "50051"
      HEALTH_HTTP_PORT: "8080"
      HEALTHCHECK_HOST: ${HEALTHCHECK_HOST}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://$$HEALTHCHECK_HOST:$$HEALTH_HTTP_PORT/health/ready\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  integration:
    build:
      context: ./integration_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/research_activity_monitoring_system_production?sslmode=disable
      PORT: "50052"
      HEALTH_HTTP_PORT: "8080"
      HEALTHCHECK_HOST: ${HEALTHCHECK_HOST}
      ORCID_PUB_API_BASE: ${ORCID_PUB_API_BASE:-}
      OPENALEX_API_BASE: ${OPENALEX_API_BASE:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-}
      GITHUB_UPLOAD_URL: ${GITHUB_UPLOAD_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://$$HEALTHCHECK_HOST:$$HEALTH_HTTP_PORT/health/ready\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  crawler:
    build:
      context: ./crawler_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/research_activity_monitoring_system_production?sslmode=disable
      PORT: "50053"
      HEALTH_HTTP_PORT: "8080"
      CRAWL_REDIS_URL: ${CRAWL_REDIS_URL}
      HEALTHCHECK_HOST: ${HEALTHCHECK_HOST}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://$$HEALTHCHECK_HOST:$$HEALTH_HTTP_PORT/health/ready\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${DOCKER_PUBLISH_BIND_ADDRESS:-127.0.0.1}:${BACKEND_PUBLISH_PORT:-3000}:3000"
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/research_activity_monitoring_system_production
      REDIS_URL: ${REDIS_URL}
      ANALYTICS_SERVICE_HOST: analytics:50051
      INTEGRATION_SERVICE_HOST: integration:50052
      CRAWLER_SERVICE_HOST: crawler:50053
      GRPC_INTEGRATION_DEADLINE_SECONDS: ${GRPC_INTEGRATION_DEADLINE_SECONDS:-120}
      GRPC_ANALYTICS_DEADLINE_SECONDS: ${GRPC_ANALYTICS_DEADLINE_SECONDS:-90}
      GRPC_CRAWL_DEADLINE_SECONDS: ${GRPC_CRAWL_DEADLINE_SECONDS:-600}
      GRPC_KEEPALIVE_TIME_MS: ${GRPC_KEEPALIVE_TIME_MS:-300000}
      GRPC_KEEPALIVE_TIMEOUT_MS: ${GRPC_KEEPALIVE_TIMEOUT_MS:-10000}
      GRPC_KEEPALIVE_PERMIT_WITHOUT_CALLS: ${GRPC_KEEPALIVE_PERMIT_WITHOUT_CALLS:-0}
      GRPC_HTTP2_MAX_PINGS_WITHOUT_DATA: ${GRPC_HTTP2_MAX_PINGS_WITHOUT_DATA:-0}
      ACTION_CABLE_ALLOWED_ORIGINS: ${ACTION_CABLE_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      HEALTHCHECK_HOST: ${HEALTHCHECK_HOST}
      BACKEND_INTERNAL_HTTP_PORT: "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://$$HEALTHCHECK_HOST:$$BACKEND_INTERNAL_HTTP_PORT/health/ready\" || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      analytics:
        condition: service_healthy
      integration:
        condition: service_healthy
      crawler:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/research_activity_monitoring_system_production
      REDIS_URL: ${REDIS_URL}
      INTEGRATION_SERVICE_HOST: integration:50052
      CRAWLER_SERVICE_HOST: crawler:50053
      DAILY_SYNC_EXCLUDE_CRAWL: ${DAILY_SYNC_EXCLUDE_CRAWL:-false}
      GRPC_INTEGRATION_DEADLINE_SECONDS: ${GRPC_INTEGRATION_DEADLINE_SECONDS:-120}
      GRPC_CRAWL_DEADLINE_SECONDS: ${GRPC_CRAWL_DEADLINE_SECONDS:-600}
      GRPC_KEEPALIVE_TIME_MS: ${GRPC_KEEPALIVE_TIME_MS:-300000}
      GRPC_KEEPALIVE_TIMEOUT_MS: ${GRPC_KEEPALIVE_TIMEOUT_MS:-10000}
      GRPC_KEEPALIVE_PERMIT_WITHOUT_CALLS: ${GRPC_KEEPALIVE_PERMIT_WITHOUT_CALLS:-0}
      GRPC_HTTP2_MAX_PINGS_WITHOUT_DATA: ${GRPC_HTTP2_MAX_PINGS_WITHOUT_DATA:-0}
      DATABASE_POOL: ${DATABASE_POOL:-32}
      GITHUB_DEV_SYNC_CONCURRENCY: ${GITHUB_DEV_SYNC_CONCURRENCY:-6}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f sidekiq || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      integration:
        condition: service_healthy
      crawler:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL}
    restart: unless-stopped
    environment:
      HEALTHCHECK_HOST: ${HEALTHCHECK_HOST}
      FRONTEND_INTERNAL_HTTP_PORT: "80"
    ports:
      - "${DOCKER_PUBLISH_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PUBLISH_PORT:-8080}:80"
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ─── Test profile ─────────────────────────────────────────────────────────
  # Общая тестовая БД: сервис db-test (POSTGRES_DB=research_activity_monitoring_system_test).
  # Схема: test-db-schema (rails db:schema:load + migrate), затем RSpec / Go-тесты подключаются к той же БД
  # (TEST_DATABASE_URL или DB_HOST=db-test + database из config/database.yml).
  # Запуск: docker-compose --profile test run --rm backend-test
  #         или через: make test-backend

  db-test:
    profiles: [test]
    image: postgres:14
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: research_activity_monitoring_system_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-test:
    profiles: [test]
    image: redis:7-alpine
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-db-schema:
    profiles: [test]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    command:
      - bash
      - -c
      - |
        set -e
        bundle exec rails db:schema:load
        bundle exec rails db:migrate
    environment:
      RAILS_ENV: test
      DB_HOST: db-test
      DB_USERNAME: postgres
      DB_PASSWORD: password
      REDIS_URL: redis://redis-test:6379/1
      SECRET_KEY_BASE: test_secret_key_base_for_ci_only
    depends_on:
      db-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    volumes:
      - ./backend:/app

  backend-test:
    profiles: [test]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    command:
      - bash
      - -c
      - |
        set -e
        COVERAGE=1 bundle exec rspec \
          --format progress \
          --format documentation --out coverage/rspec_results.txt \
          --format json --out coverage/rspec_results.json
    environment:
      RAILS_ENV: test
      DB_HOST: db-test
      DB_USERNAME: postgres
      DB_PASSWORD: password
      REDIS_URL: redis://redis-test:6379/1
      SECRET_KEY_BASE: test_secret_key_base_for_ci_only
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_LOG_LEVEL: warn
    volumes:
      - ./backend:/app
      - ./backend/coverage:/app/coverage
    depends_on:
      db-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      test-db-schema:
        condition: service_completed_successfully

  # integration_service: go test ./... ; в coverpkg не входят сгенерированные pb/proto (иначе 0% на codegen тянет total вниз).
  integration-test:
    profiles: [test]
    image: golang:1.25-alpine
    working_dir: /app
    command:
      - sh
      - -c
      - |
        set -e
        go mod tidy
        mkdir -p coverage
        PKGS=$$(go list ./... | grep -vE '/(pb|proto)$$' | tr '\n' ',')
        go test -p 1 -tags go1.21 -coverpkg="$${PKGS%,}" -coverprofile=coverage/coverage.out ./... &&
        go tool cover -html=coverage/coverage.out -o coverage/coverage.html &&
        go tool cover -func=coverage/coverage.out | tee coverage/coverage.txt
    environment:
      CGO_ENABLED: "0"
      # Общая тестовая БД (та же, что и у backend-test / RAILS test).
      TEST_DATABASE_URL: postgres://postgres:password@db-test:5432/research_activity_monitoring_system_test?sslmode=disable
    depends_on:
      db-test:
        condition: service_healthy
      test-db-schema:
        condition: service_completed_successfully
    volumes:
      - ./integration_service:/app
      - go_mod_cache:/root/go/pkg/mod

  # analytics_service: -p 1 — один пакет за раз, иначе TRUNCATE на общей БД даёт deadlock и гонки FK между пакетами.
  analytics-test:
    profiles: [test]
    image: golang:1.25-alpine
    working_dir: /app
    command:
      - sh
      - -c
      - |
        set -e
        go mod tidy
        mkdir -p coverage
        PKGS=$$(go list ./internal/... | tr '\n' ',')
        go test -p 1 -tags go1.21 -coverpkg="$${PKGS%,}" -coverprofile=coverage/coverage.out ./internal/... &&
        go tool cover -html=coverage/coverage.out -o coverage/coverage.html &&
        go tool cover -func=coverage/coverage.out | tee coverage/coverage.txt
    environment:
      CGO_ENABLED: "0"
      TEST_DATABASE_URL: postgres://postgres:password@db-test:5432/research_activity_monitoring_system_test?sslmode=disable
    depends_on:
      db-test:
        condition: service_healthy
      test-db-schema:
        condition: service_completed_successfully
    volumes:
      - ./analytics_service:/app
      - go_mod_cache:/root/go/pkg/mod

volumes:
  pgdata:
  redis_data:
  go_mod_cache:
