type: object
required:
  - items
  - pagination
properties:
  items:
    type: array
    items:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: integer
        title:
          type: string
        points:
          type: [number, string]
          nullable: true
        icon_name:
          type: string
          nullable: true
  pagination:
    type: object
    properties:
      total:
        type: integer
      limit:
        type: integer
      offset:
        type: integer
