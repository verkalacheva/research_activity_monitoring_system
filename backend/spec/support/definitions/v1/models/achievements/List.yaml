type: object
required:
  - items
  - pagination
properties:
  items:
    type: array
    items:
      type: object
      required:
        - id
        - achievement_type_id
      properties:
        id:
          type: integer
        achievement_type_id:
          type: integer
        achievement_status_id:
          type: integer
        achievement_result_id:
          type: integer
        achievement_participation_id:
          type: integer
        points:
          type: [number, string]
          nullable: true
        submission_date:
          type: string
          format: date
          nullable: true
  pagination:
    type: object
    properties:
      total:
        type: integer
      limit:
        type: integer
      offset:
        type: integer
