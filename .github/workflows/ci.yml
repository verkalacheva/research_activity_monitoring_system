name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  API_BASE_URL: ${{ vars.API_BASE_URL }}
  HEALTHCHECK_HOST: ${{ vars.HEALTHCHECK_HOST }}
  REDIS_URL: ${{ vars.REDIS_URL }}

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Check repository variables
        run: |
          : "${API_BASE_URL:?set repository variable API_BASE_URL (Actions → Variables)}"
          : "${REDIS_URL:?set repository variable REDIS_URL (Actions → Variables)}"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler: "2.4.22"
          bundler-cache: true
      - name: Install native deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libpq-dev
      - name: Bundle install
        run: bundle install --jobs 4 --retry 3
      - name: Zeitwerk check
        run: bundle exec rails zeitwerk:check

  go-analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: analytics_service/go.sum
      - name: Test build analytics_service
        working-directory: analytics_service
        run: go build -o /dev/null .

  go-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: integration_service/go.sum
      - name: Test build integration_service
        working-directory: integration_service
        run: go build -o /dev/null .

  docker:
    runs-on: ubuntu-latest
    needs: [backend, go-analytics, go-integration]
    steps:
      - uses: actions/checkout@v4
      - name: Check repository variables for Docker
        run: |
          : "${API_BASE_URL:?set API_BASE_URL}"
          : "${HEALTHCHECK_HOST:?set HEALTHCHECK_HOST}"
          : "${REDIS_URL:?set REDIS_URL}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: research-backend:ci
      - name: Build analytics image
        uses: docker/build-push-action@v6
        with:
          context: ./analytics_service
          file: ./analytics_service/Dockerfile
          push: false
          tags: research-analytics:ci
      - name: Build integration image
        uses: docker/build-push-action@v6
        with:
          context: ./integration_service
          file: ./integration_service/Dockerfile
          push: false
          tags: research-integration:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: research-frontend:ci
          build-args: |
            API_BASE_URL=${{ env.API_BASE_URL }}
      - name: Build crawler image
        uses: docker/build-push-action@v6
        with:
          context: ./crawler_service
          file: ./crawler_service/Dockerfile
          push: false
          tags: research-crawler:ci
