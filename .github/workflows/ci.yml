name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  API_BASE_URL: ${{ vars.API_BASE_URL }}
  HEALTHCHECK_HOST: ${{ vars.HEALTHCHECK_HOST }}
  REDIS_URL: ${{ vars.REDIS_URL }}
  # Test DB URLs: repository Variables, or default URL for the postgres service in this workflow.
  DATABASE_URL: ${{ vars.DATABASE_URL || 'postgres://postgres:password@localhost:5432/research_activity_monitoring_system_test?sslmode=disable' }}
  TEST_DATABASE_URL: ${{ vars.TEST_DATABASE_URL || vars.DATABASE_URL || 'postgres://postgres:password@localhost:5432/research_activity_monitoring_system_test?sslmode=disable' }}

jobs:
  # ─── Ruby / Rails backend ───────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: research_activity_monitoring_system_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      REDIS_URL: ${{ vars.REDIS_URL || 'redis://localhost:6379/0' }}
      COVERAGE: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler: "2.4.22"
          bundler-cache: true

      - name: Install native deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Zeitwerk check
        run: bundle exec rails zeitwerk:check

      - name: Set up database
        run: bundle exec rails db:schema:load

      - name: Run RSpec
        run: |
          bundle exec rspec \
            --format progress \
            --format documentation --out coverage/rspec_results.txt \
            --format json --out coverage/rspec_results.json

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            backend/coverage/index.html
            backend/coverage/coverage.json
            backend/coverage/rspec_results.txt
            backend/coverage/rspec_results.json
          retention-days: 30

  # ─── Python / crawler ───────────────────────────────────────────────────────
  crawler:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crawler_service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawler_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run pytest with coverage
        run: |
          python3 -m pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=html:coverage/html \
            --cov-report=xml:coverage/coverage.xml \
            --cov-config=.coveragerc \
            -v

      - name: Upload crawler coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawler-coverage
          path: |
            crawler_service/coverage/html/
            crawler_service/coverage/coverage.xml
          retention-days: 30

  # ─── Go / analytics_service ─────────────────────────────────────────────────
  go-analytics:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: research_activity_monitoring_system_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install native deps (Rails schema load)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler: "2.4.22"
          bundler-cache: true
          working-directory: backend

      - name: Load database schema for Go analytics tests
        working-directory: backend
        env:
          RAILS_ENV: test
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: |
          bundle install --jobs 4 --retry 3
          bundle exec rails db:schema:load

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: analytics_service/go.sum

      - name: Run tests with coverage
        working-directory: analytics_service
        run: |
          mkdir -p coverage
          # -p 1: shared Postgres; parallel packages cause TRUNCATE deadlocks and FK races (see docker-compose analytics-test).
          go test -p 1 -tags go1.21 -coverprofile=coverage/coverage.out -covermode=atomic ./...
          go tool cover -html=coverage/coverage.out -o coverage/coverage.html
          go tool cover -func=coverage/coverage.out | tee coverage/coverage.txt

      - name: Upload analytics coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-coverage
          path: |
            analytics_service/coverage/coverage.html
            analytics_service/coverage/coverage.txt
            analytics_service/coverage/coverage.out
          retention-days: 30

  # ─── Go / integration_service ───────────────────────────────────────────────
  go-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: research_activity_monitoring_system_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install native deps (Rails schema load)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler: "2.4.22"
          bundler-cache: true
          working-directory: backend

      - name: Load database schema for integration_service tests
        working-directory: backend
        env:
          RAILS_ENV: test
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: |
          bundle install --jobs 4 --retry 3
          bundle exec rails db:schema:load

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: integration_service/go.sum

      - name: Run tests with coverage
        working-directory: integration_service
        run: |
          mkdir -p coverage
          # -p 1: shared TEST_DATABASE_URL; same rationale as integration-test in docker-compose.
          go test -p 1 -tags go1.21 -coverprofile=coverage/coverage.out -covermode=atomic ./...
          go tool cover -html=coverage/coverage.out -o coverage/coverage.html
          go tool cover -func=coverage/coverage.out | tee coverage/coverage.txt

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage
          path: |
            integration_service/coverage/coverage.html
            integration_service/coverage/coverage.txt
            integration_service/coverage/coverage.out
          retention-days: 30

  # ─── Docker build ───────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, crawler, go-analytics, go-integration]
    steps:
      - uses: actions/checkout@v4

      - name: Check repository variables for Docker
        run: |
          : "${API_BASE_URL:?set API_BASE_URL}"
          : "${HEALTHCHECK_HOST:?set HEALTHCHECK_HOST}"
          : "${REDIS_URL:?set REDIS_URL}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: research-backend:ci

      - name: Build analytics image
        uses: docker/build-push-action@v6
        with:
          context: ./analytics_service
          file: ./analytics_service/Dockerfile
          push: false
          tags: research-analytics:ci

      - name: Build integration image
        uses: docker/build-push-action@v6
        with:
          context: ./integration_service
          file: ./integration_service/Dockerfile
          push: false
          tags: research-integration:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: research-frontend:ci
          build-args: |
            API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Build crawler image
        uses: docker/build-push-action@v6
        with:
          context: ./crawler_service
          file: ./crawler_service/Dockerfile
          push: false
          tags: research-crawler:ci

  # ─── Coverage summary ───────────────────────────────────────────────────────
  coverage-summary:
    runs-on: ubuntu-latest
    needs: [backend, crawler, go-analytics, go-integration]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts

      - name: Generate coverage summary
        run: |
          echo "# Test Coverage Report" > coverage_summary.md
          echo "" >> coverage_summary.md
          echo "Generated: $(date -u '+%Y-%m-%d %H:%M UTC')" >> coverage_summary.md
          echo "" >> coverage_summary.md

          echo "## backend (Ruby/RSpec)" >> coverage_summary.md
          if [ -f coverage-artifacts/backend-coverage/coverage.json ]; then
            python3 - <<'EOF' >> coverage_summary.md
          import json, sys
          try:
              with open("coverage-artifacts/backend-coverage/coverage.json") as f:
                  data = json.load(f)
              pct = data.get("metrics", {}).get("covered_percent", "N/A")
              print(f"- Line coverage: **{pct:.1f}%**" if isinstance(pct, float) else f"- Line coverage: {pct}")
          except Exception as e:
              print(f"- Coverage data unavailable: {e}")
          EOF
          else
            echo "- Coverage artifact not available" >> coverage_summary.md
          fi

          echo "" >> coverage_summary.md
          echo "## crawler_service (Python/pytest)" >> coverage_summary.md
          if [ -f coverage-artifacts/crawler-coverage/coverage/coverage.xml ]; then
            python3 - <<'EOF' >> coverage_summary.md
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse("coverage-artifacts/crawler-coverage/coverage/coverage.xml")
              root = tree.getroot()
              rate = float(root.get("line-rate", 0)) * 100
              print(f"- Line coverage: **{rate:.1f}%**")
          except Exception as e:
              print(f"- Coverage data unavailable: {e}")
          EOF
          else
            echo "- Coverage artifact not available" >> coverage_summary.md
          fi

          echo "" >> coverage_summary.md
          echo "## integration_service (Go)" >> coverage_summary.md
          if [ -f coverage-artifacts/integration-coverage/coverage/coverage.txt ]; then
            grep '^total' coverage-artifacts/integration-coverage/coverage/coverage.txt \
              | awk '{print "- Total coverage: **" $3 "**"}' >> coverage_summary.md || \
              echo "- Coverage data unavailable" >> coverage_summary.md
          else
            echo "- Coverage artifact not available" >> coverage_summary.md
          fi

          echo "" >> coverage_summary.md
          echo "## analytics_service (Go)" >> coverage_summary.md
          if [ -f coverage-artifacts/analytics-coverage/coverage/coverage.txt ]; then
            grep '^total' coverage-artifacts/analytics-coverage/coverage/coverage.txt \
              | awk '{print "- Total coverage: **" $3 "**"}' >> coverage_summary.md || \
              echo "- Coverage data unavailable" >> coverage_summary.md
          else
            echo "- Coverage artifact not available" >> coverage_summary.md
          fi

          echo "" >> coverage_summary.md
          echo "## Artifacts" >> coverage_summary.md
          echo "- \`backend-coverage\` — SimpleCov HTML + JSON" >> coverage_summary.md
          echo "- \`crawler-coverage\` — pytest-cov HTML + XML" >> coverage_summary.md
          echo "- \`integration-coverage\` — go tool cover HTML" >> coverage_summary.md
          echo "- \`analytics-coverage\` — go tool cover HTML" >> coverage_summary.md

          cat coverage_summary.md

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage_summary.md
          retention-days: 30
