# Пример: Nginx на хосте, Docker Compose публикует:
#   backend  → 127.0.0.1:3000
#   frontend → 127.0.0.1:8080
# (в .env: BACKEND_PUBLISH_PORT=3000, FRONTEND_PUBLISH_PORT=8080, привязка только к loopback)
#
# Скопируйте в /etc/nginx/sites-available/ и сделайте symlink в sites-enabled.
# Подставьте домен, пути к сертификатам (certbot) и при необходимости порты.

upstream research_frontend {
    server 127.0.0.1:8080;
    keepalive 8;
}

upstream research_backend {
    server 127.0.0.1:3000;
    keepalive 8;
}

# Редирект HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # Let's Encrypt (после certbot)
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    # API и health на Rails
    location /api/ {
        proxy_pass http://research_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://research_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Action Cable (веб-фронт: wss://<хост>/cable)
    location /cable {
        proxy_pass http://research_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }

    # Flutter Web (статик из контейнера nginx:alpine)
    location / {
        proxy_pass http://research_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
